<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Layout Stats</title>
  <link href='https://fonts.googleapis.com/css?family=Roboto Mono' rel='stylesheet'>
  <link rel="icon" type="image/x-icon" href="favicon.gif">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #1b1c1f; color: #dfe2eb; }
    a { color: #dfe2eb; text-decoration: none; }
    a:hover { background: #40434a; }
    .sidebar { position: fixed; inset: 0 auto 0 0; width: 200px; overflow-y: auto; background: #151619; padding: 16px 0; }
    .sidebar a { display: block; padding: 4px 16px; }
    .content { margin-left: 200px; padding: 16px 24px 40px; }
    .toolbar { position: sticky; top: 0; z-index: 2; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px 0 14px; background: #1b1c1f; }
    .sort-button, .corpus-select { height: 30px; background: #333333; color: #cccccc; border: none; border-radius: 4px; padding: 0 10px; }
    .sort-button { cursor: pointer; }
    .layout-card { margin-bottom: 24px; border-bottom: 1px solid #2b2d33; padding-bottom: 18px; }
    .layout-title { margin: 0 0 6px; font-size: 28px; font-weight: 700; }
    .source { display: inline; font-size: 10px; vertical-align: sub; margin-left: 4px; }
    .meta { display: flex; gap: 14px; align-items: center; margin: 0 0 10px; flex-wrap: wrap; }
    .layout-frame { width: 1040px; max-width: 100%; height: 980px; border: 0; background: #1b1c1f; display: block; }
    .empty { color: #aeb4c2; padding: 24px 0; }
    #content { display: flex; flex-direction: column; }
    @media (max-width: 1170px) {
      .sidebar { display: none; }
      .content { margin-left: 0; }
    }
  </style>
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content">
    <div class="toolbar">
      <button class="sort-button" data-sort="name">Sort by Name</button>
      <button class="sort-button" data-sort="sfb">Sort by SFB</button>
      <button class="sort-button" data-sort="effort">Sort by Effort</button>
      <button class="sort-button" data-sort="skip">Sort by Skip Bigrams</button>
      <button class="sort-button" data-sort="lat">Sort by Lat Stretch</button>
      <select class="corpus-select" id="corpusSelect">
        <option value="english">English</option>
        <option value="programming">Programming</option>
        <option value="dutch">Dutch</option>
        <option value="estonian">Estonian</option>
        <option value="finnish">Finnish</option>
        <option value="french">French</option>
        <option value="german">German</option>
        <option value="hungarian">Hungarian</option>
        <option value="italian">Italian</option>
        <option value="lithuanian">Lithuanian</option>
        <option value="norweigan">Norweigan</option>
        <option value="polish">Polish</option>
        <option value="portuguese">Portuguese</option>
        <option value="spanish">Spanish</option>
        <option value="swedish">Swedish</option>
      </select>
    </div>
    <div id="content" class="empty">Loading layouts...</div>
  </main>
  <script>
    const HOMEPAGE_CACHE_VERSION = 'v2';
    const content = document.getElementById('content');
    const sidebar = document.getElementById('sidebar');
    const corpusSelect = document.getElementById('corpusSelect');
    const sortButtons = Array.from(document.querySelectorAll('[data-sort]'));
    let layouts = [];
    let activeSort = 'default';
    let currentCorpus = new URLSearchParams(window.location.search).get('lan') || 'english';
    corpusSelect.value = currentCorpus;

    function getCacheKey(layout) {
      return `homepage-layout-cache:${HOMEPAGE_CACHE_VERSION}:${currentCorpus}:${layout.anchor}:${layout.query}`;
    }

    function readCachedLayout(layout) {
      try {
        const raw = localStorage.getItem(getCacheKey(layout));
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        console.warn('Failed to read cached layout', layout.anchor, error);
        return null;
      }
    }

    function writeCachedLayout(layout, payload) {
      try {
        localStorage.setItem(getCacheKey(layout), JSON.stringify(payload));
      } catch (error) {
        console.warn('Failed to write cached layout', layout.anchor, error);
      }
    }

    function buildStaticSnapshot(doc) {
      const clone = doc.documentElement.cloneNode(true);
      clone.querySelectorAll('script').forEach(script => script.remove());
      const body = clone.querySelector('body');
      if (body) {
        body.style.overflow = 'hidden';
        body.style.margin = '0';
      }
      return '<!DOCTYPE html>\n' + clone.outerHTML;
    }

    function captureFrameCache(layout) {
      if (!layout.frame || !layout.metrics) {
        return;
      }
      try {
        const doc = layout.frame.contentDocument;
        if (!doc || !doc.documentElement) {
          return;
        }
        writeCachedLayout(layout, {
          metrics: layout.metrics,
          height: layout.cachedHeight || parseInt(layout.frame.style.height || '988', 10),
          html: buildStaticSnapshot(doc),
        });
      } catch (error) {
        console.warn('Failed to capture cached iframe HTML', layout.anchor, error);
      }
    }

    function loadLayoutFrame(layout) {
      const cached = readCachedLayout(layout);
      if (cached?.html) {
        layout.metrics = cached.metrics || null;
        layout.cachedHeight = cached.height || 988;
        layout.frame.style.height = `${layout.cachedHeight}px`;
        layout.frame.srcdoc = cached.html;
        return;
      }
      layout.metrics = null;
      layout.cachedHeight = 988;
      layout.frame.style.height = '988px';
      layout.frame.removeAttribute('srcdoc');
      layout.frame.src = buildEmbedSrc(layout);
    }

    function buildEmbedSrc(layout) {
      return `home_layout.html?embed=1&spaceStats=0&lan=${encodeURIComponent(currentCorpus)}&${layout.query}&layoutId=${encodeURIComponent(layout.anchor)}`;
    }

    function metricValue(layout, key) {
      if (key === 'default') {
        return layout.originalIndex;
      }
      if (key === 'name') {
        return layout.name.toLowerCase();
      }
      return typeof layout.metrics?.[key] === 'number' ? layout.metrics[key] : Number.POSITIVE_INFINITY;
    }

    function sortLayouts() {
      layouts.sort((a, b) => {
        const av = metricValue(a, activeSort);
        const bv = metricValue(b, activeSort);
        if (activeSort === 'name') {
          return av.localeCompare(bv);
        }
        if (av === bv) {
          return a.originalIndex - b.originalIndex;
        }
        return av - bv;
      });
      layouts.forEach((layout, index) => {
        layout.element.style.order = index;
      });
    }

    function renderLayouts() {
      content.innerHTML = '';
      sidebar.innerHTML = '';
      for (const layout of layouts) {
        const navLink = document.createElement('a');
        navLink.href = `#${layout.anchor}`;
        navLink.textContent = layout.name;
        sidebar.appendChild(navLink);

        const card = document.createElement('section');
        card.className = 'layout-card';
        card.id = layout.anchor;

        const title = document.createElement('h1');
        title.className = 'layout-title';
        title.textContent = layout.name;
        if (layout.source) {
          const source = document.createElement('a');
          source.className = 'source';
          source.href = layout.source;
          source.textContent = 'source';
          title.appendChild(source);
        }

        const meta = document.createElement('div');
        meta.className = 'meta';
        const edit = document.createElement('a');
        edit.href = `playground.html?${layout.query}&lan=${encodeURIComponent(currentCorpus)}&spaceStats=0`;
        edit.textContent = 'Edit';
        meta.appendChild(edit);

        const frame = document.createElement('iframe');
        frame.className = 'layout-frame';
        frame.loading = 'lazy';
        frame.scrolling = 'no';
        frame.addEventListener('load', () => {
          if (!layout.frame.hasAttribute('srcdoc')) {
            window.setTimeout(() => captureFrameCache(layout), 50);
          }
        });

        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(frame);

        layout.element = card;
        layout.frame = frame;
        layout.edit = edit;
        loadLayoutFrame(layout);
        content.appendChild(card);
      }
      sortLayouts();
    }

    function updateCorpus() {
      currentCorpus = corpusSelect.value;
      const params = new URLSearchParams(window.location.search);
      params.set('lan', currentCorpus);
      history.replaceState(null, '', `?${params.toString()}`);
      for (const layout of layouts) {
        layout.edit.href = `playground.html?${layout.query}&lan=${encodeURIComponent(currentCorpus)}&spaceStats=0`;
        loadLayoutFrame(layout);
      }
      if (activeSort === 'default' || activeSort === 'name') {
        sortLayouts();
      }
    }

    window.addEventListener('message', event => {
      const data = event.data;
      if (!data || data.type !== 'layoutMetrics') {
        return;
      }
      if (data.lang !== currentCorpus) {
        return;
      }
      const layout = layouts.find(item => item.anchor === data.layoutId);
      if (!layout) {
        return;
      }
      layout.metrics = data.metrics;
      window.setTimeout(() => captureFrameCache(layout), 50);
    });

    window.addEventListener('message', event => {
      const data = event.data;
      if (!data || data.type !== 'layoutHeight') {
        return;
      }
      if (data.lang !== currentCorpus) {
        return;
      }
      const layout = layouts.find(item => item.anchor === data.layoutId);
      if (!layout) {
        return;
      }
      if (typeof data.height === 'number' && data.height > 0) {
        layout.cachedHeight = data.height + 8;
        layout.frame.style.height = `${layout.cachedHeight}px`;
        window.setTimeout(() => captureFrameCache(layout), 50);
      }
    });

    sortButtons.forEach(button => {
      button.addEventListener('click', () => {
        activeSort = button.dataset.sort;
        sortLayouts();
      });
    });

    corpusSelect.addEventListener('change', updateCorpus);

    fetch(`layouts-home.json?v=${Date.now()}`, { cache: 'no-store' })
      .then(response => response.json())
      .then(data => {
        layouts = data.map((item, index) => ({ ...item, metrics: null, originalIndex: index }));
        content.classList.remove('empty');
        renderLayouts();
      })
      .catch(error => {
        console.error(error);
        content.textContent = 'Failed to load layouts.';
      });
  </script>
</body>
</html>
